<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
    <title>Lezione Form</title>
</head>

<body>
    <header>

    </header>

    <main>
        <div class="container">
            <h1>Form di Contatto</h1>

            <form action="pagina_server.php" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" placeholder="Inserisci il tuo nome">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Inserisci la password">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Inserisci la tua email">
                </div>

                <div class="form-group">
                    <label for="eta">Età:</label>
                    <input type="number" name="eta" id="eta" min="18" max="90" placeholder="Inserisci la tua età">
                </div>

                <div class="form-group">
                    <label for="data-nascita">Data di Nascita:</label>
                    <input type="date" name="data-nascita" id="data-nascita">
                </div>

                <fieldset class="form-group">
                    <legend>Sesso:</legend>

                    <label class="radio-button">
                        <input type="radio" name="sesso" id="maschio" value="maschio">
                        Maschio
                    </label>

                    <label class="radio-button">
                        <input type="radio" name="sesso" id="femmina" value="femmina">
                        Femmina
                    </label>
                </fieldset>

                <div class="form-group">
                    <label for="prov">Provincia</label>
                    <select name="prov" id="prov" required>
                        <option value="" selected disabled>Seleziona una città...</option>
                        <option value="Milano">Milano</option>
                        <option value="Roma">Roma</option>
                        <option value="Napoli">Napoli</option>
                        <option value="Torino">Torino</option>
                        <option value="Firenze">Firenze</option>
                        <option value="Bologna">Bologna</option>
                        <option value="Palermo">Palermo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="file-mix">Inserisci un file Mix:</label>
                    <input type="file" name="file-mix" id="file-mix" accept=".mix">
                </div>

                <div class="form-group">
                    <label for="file-pdf">Inserisci un file PDF o DOCX:</label>
                    <input type="file" name="file-pdf" id="file-pdf" accept=".pdf,.docx">
                </div>

                <div class="form-group">
                    <label for="descrizione">Descrizione</label>
                    <textarea name="descrizione" id="descrizione" cols="30" rows="10"
                        placeholder="Scrivi il tuo messaggio..."></textarea>
                </div>

                <div class="form-group">
                    <label>Solo lettura:</label>
                    <input type="text" name="solo-lettura" id="solo-lettura" placeholder="Campo di sola lettura" readonly>
                </div>

                <div class="form-group">
                    <label>Disabilitato</label>
                    <input type="text" name="disabilitato" id="disabilitato" placeholder="Campo disabilitato" disabled>
                </div>
                
                <div class="form-group">
                    <input type="checkbox" name="termini" id="termini">
                    <label for="termini">Accetto i termini e le condizioni</label>
                    <a href="#condizioni">Leggi le condizioni</a>
                </div>

                <input type="hidden" name="nascosto" id="nascosto" value="1">

                <button type="reset">Reset</button>
                <button type="submit">Invia</button>
            </form>

        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
